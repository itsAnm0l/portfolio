  <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=696de0f130f42d347ddee6b7" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/split-type"></script>
  <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
  <script>
gsap.registerPlugin(ScrollTrigger);
// ============================================================
// LENIS
// ============================================================
const lenis = new Lenis({
  duration: 1.2,
  easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
});
gsap.ticker.add((time) => lenis.raf(time * 1000));
gsap.ticker.lagSmoothing(0);
    
// PAGE ANIMATIONS
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // --- TESTIMONIAL SLIDER ---
  let typeSplit;
  function animateSlide(activeSlide) {
    const quoteElement = activeSlide.querySelector('.quote-text');
    if (!quoteElement) return;
    if (typeSplit) typeSplit.revert();
    gsap.set(quoteElement, { opacity: 1 });
    typeSplit = new SplitType(quoteElement, { types: 'lines', lineClass: 'line-child' });
    typeSplit.lines.forEach(line => {
      const wrapper = document.createElement('div');
      wrapper.style.overflow = 'hidden';
      wrapper.style.display = 'block';
      line.parentNode.insertBefore(wrapper, line);
      wrapper.appendChild(line);
    });
    gsap.set(typeSplit.lines, { y: "105%" });
    gsap.set(activeSlide.querySelectorAll('.author-name, .author-title, img'), { opacity: 0, y: 10 });
    const tl = gsap.timeline();
    tl.to(typeSplit.lines, { y: "0%", duration: 1, stagger: 0.1, ease: "power4.out" })
      .to(activeSlide.querySelectorAll('.author-name, .author-title, img'), { opacity: 1, y: 0, duration: 0.8, stagger: 0.1, ease: "power2.out" }, "-=0.7");
  }
  if (document.querySelector('.swiper')) {
    new Swiper('.swiper', {
      effect: 'fade', crossFade: true, speed: 800, loop: true,
      autoplay: { delay: 6000, disableOnInteraction: false },
      pagination: { el: '.swiper-pagination', clickable: true },
      on: {
        init: function () { animateSlide(this.slides[this.activeIndex]); },
        slideChangeTransitionStart: function () {
          gsap.killTweensOf(".line-child");
          animateSlide(this.slides[this.activeIndex]);
        }
      }
    });
  }
  // --- WORK SECTION ---
  gsap.from(".work-header", {
    scrollTrigger: { trigger: ".work-header", start: "top 85%" },
    opacity: 0, y: 30, duration: 1, ease: "power3.out"
  });
  ScrollTrigger.batch(".work-item", {
    start: "top 85%",
    onEnter: batch => gsap.from(batch, { opacity: 0, y: 40, stagger: 0.15, duration: 1, ease: "power4.out", overwrite: true })
  });
  document.querySelectorAll('.work-item').forEach((item) => {
    const img = item.querySelector('img');
    if (img) {
      gsap.from(img, {
        scrollTrigger: { trigger: item, start: "top 95%", toggleActions: "play none none reverse" },
        scale: 1.2, duration: 1.5, ease: "expo.out"
      });
    }
  });
  // --- FEEDBACK ---
  gsap.from(".feedback-warpper h3", {
    scrollTrigger: { trigger: ".feedback-warpper", start: "top 85%" },
    opacity: 0, x: -30, duration: 1.2, ease: "power3.out"
  });
  gsap.from(".feedback-item", {
    scrollTrigger: { trigger: ".feedback-list", start: "top 80%" },
    opacity: 0, y: 60, stagger: 0.2, duration: 1.2, ease: "power4.out"
  });
  // --- DELIGHT ---
  gsap.from(".js-quote-line", {
    scrollTrigger: { trigger: ".js-quote-section", start: "top 75%", end: "bottom 25%", scrub: 1 },
    yPercent: 100, opacity: 0, stagger: 0.2, ease: "power3.out"
  });
  // --- SERVICES ---
  gsap.from(".services-wrapper h3", {
    scrollTrigger: { trigger: ".services-section", start: "top 85%" },
    opacity: 0, y: 20, duration: 1, ease: "power3.out"
  });
  gsap.from(".service-card", {
    scrollTrigger: { trigger: ".services-list", start: "top 80%" },
    opacity: 0, y: 40, scale: 0.95, duration: 1.2, stagger: 0.2, ease: "power4.out"
  });
  // --- PROCESS ---
  const processTitle = document.getElementById("process-title");
  if (processTitle) {
    gsap.from(processTitle, {
      scrollTrigger: { trigger: "#process-trigger", start: "top 90%" },
      opacity: 0, y: 20, duration: 1, ease: "power3.out"
    });
  }
  const processItems = document.querySelectorAll(".js-process-item");
  if (processItems.length > 0) {
    gsap.from(processItems, {
      scrollTrigger: { trigger: "#process-trigger", start: "top 80%" },
      opacity: 0, y: 40, scale: 0.98, duration: 1.1, stagger: 0.15, ease: "power4.out",
      onStart: function () {
        processItems.forEach(el => {
          if (window.getComputedStyle(el).display === 'none') {
            gsap.set(el, { opacity: 1, y: 0, scale: 1 });
          }
        });
      }
    });
  }
  document.querySelectorAll('.process-image-wrapper img').forEach((img) => {
    gsap.to(img, {
      scrollTrigger: { trigger: img, start: "top bottom", end: "bottom top", scrub: 0.5 },
      y: -30, ease: "none"
    });
  });
  // --- CTA & EMAIL ---
  const ctaGrid = document.querySelector(".cta-cal");
  if (ctaGrid) {
    const ctaTl = gsap.timeline({ scrollTrigger: { trigger: ctaGrid, start: "top 85%" } });
    ctaTl.from(".cta-right > *", { opacity: 0, y: 30, stagger: 0.15, duration: 1, ease: "power3.out" })
         .from(".cal-embed", { opacity: 0, x: 20, duration: 1.2, ease: "power2.out" }, "-=0.8");
  }
  const emailContainer = document.querySelector('.js-email-container');
  const emailTextNode = document.querySelector('.js-email-text');
  const copyIcon = document.querySelector('.js-copy-icon');
  if (emailContainer && emailTextNode) {
    const originalEmail = emailTextNode.innerText;
    emailContainer.addEventListener("click", function () {
      navigator.clipboard.writeText(originalEmail).then(() => {
        emailTextNode.innerText = "Email Copied!";
        gsap.to(emailContainer, { opacity: 0.5, duration: 0.2 });
        if (copyIcon) gsap.to(copyIcon, { scale: 1.2, duration: 0.1, yoyo: true, repeat: 1 });
        setTimeout(() => {
          emailTextNode.innerText = originalEmail;
          gsap.to(emailContainer, { opacity: 0.8, duration: 0.4 });
        }, 2000);
      });
    });
  }
  // --- FOOTER ---
  const footerTl = gsap.timeline({
    scrollTrigger: { trigger: ".footer-section", start: "top 75%", toggleActions: "play none none none" }
  });
  footerTl
    .from(".footer-container > img", { opacity: 0, y: 20, duration: 0.8, ease: "power2.out" })
    .from(".footer-link_wrapper", { opacity: 0, y: 15, stagger: 0.2, duration: 0.8, ease: "power2.out" }, "-=0.4")
    .from(".footer-quote-wrapper, .footer-meta", { opacity: 0, scale: 0.95, y: 20, stagger: 0.2, duration: 1, ease: "expo.out" }, "-=0.5");
  // --- CLOCK ---
  const hoursEl = document.querySelector(".clock-hours");
  const minutesEl = document.querySelector(".clock-minutes");
  const metaEl = document.querySelector(".clock-meta");
  if (hoursEl && minutesEl && metaEl) {
    function updateClock() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Kolkata", hour: "numeric", minute: "2-digit", hour12: true
      }).formatToParts(now);
      hoursEl.textContent = parts.find(p => p.type === "hour").value;
      minutesEl.textContent = parts.find(p => p.type === "minute").value;
      metaEl.textContent = ` ${parts.find(p => p.type === "dayPeriod").value} (IST)`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  }
  ScrollTrigger.refresh();
});
// ============================================================
// PAGE ARRIVAL
// ============================================================
window.addEventListener('load', () => {
  document.body.classList.add('page-ready');
});
</script>
</body>
