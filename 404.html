<body>
  <div class="utility-page-wrap">
    <div class="utility-page-content"><img src="https://d3e54v103j8qbb.cloudfront.net/static/page-not-found.211a85e40c.svg" alt="">
      <h2>Page Not Found</h2>
      <div>The page you are looking for doesn&#x27;t exist or has been moved</div>
    </div>
  </div>
  <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=696de0f130f42d347ddee6b7" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/split-type"></script>
  <script src="https://unpkg.com/@barba/core"></script>
  <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
  <script>
gsap.registerPlugin(ScrollTrigger);
// 1. INITIALIZE LENIS (Smooth Scroll)
const lenis = new Lenis({
  duration: 1.2,
  easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
});
// Sync ScrollTrigger with Lenis
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add((time) => lenis.raf(time * 1000));
gsap.ticker.lagSmoothing(0);
// 2. CUSTOM CURSOR
const cursorEl = document.createElement('div');
cursorEl.classList.add('custom-cursor');
document.body.appendChild(cursorEl);
const xTo = gsap.quickTo(cursorEl, "x", { duration: 0.4, ease: "power3.out" });
const yTo = gsap.quickTo(cursorEl, "y", { duration: 0.4, ease: "power3.out" });
window.addEventListener('mousemove', (e) => {
  xTo(e.clientX);
  yTo(e.clientY);
});
// 3. THE ANIMATION ENGINE
function initPageScripts() {
  // Kill old triggers to prevent ghost scrolling
  ScrollTrigger.getAll().forEach(t => t.kill());
  // --- TESTIMONIALS ---
  if (document.querySelector('.swiper')) {
    let typeSplit;
    const animateSlide = (activeSlide) => {
      const quote = activeSlide.querySelector('.quote-text');
      if (!quote) return;
      if (typeSplit) typeSplit.revert();
      typeSplit = new SplitType(quote, { types: 'lines' });
      typeSplit.lines.forEach(l => {
        const wrap = document.createElement('div');
        wrap.className = 'line-wrapper';
        l.parentNode.insertBefore(wrap, l);
        wrap.appendChild(l);
      });
      gsap.from(typeSplit.lines, { yPercent: 105, duration: 1, stagger: 0.1, ease: "power4.out" });
      gsap.from(activeSlide.querySelectorAll('.author-name, .author-title, img'), { opacity: 0, y: 15, duration: 0.8, stagger: 0.1, ease: "power2.out" }, "-=0.6");
    };
    new Swiper('.swiper', {
      effect: 'fade', crossFade: true, loop: true,
      autoplay: { delay: 6000 },
      pagination: { el: '.swiper-pagination', clickable: true },
      on: {
        init: function() { animateSlide(this.slides[this.activeIndex]); },
        slideChangeTransitionStart: function() { animateSlide(this.slides[this.activeIndex]); }
      }
    });
  }
  // --- BATCH REVEALS (Work, Feedback, Services) ---
  const reveals = [".work-item", ".feedback-item", ".service-card"];
  reveals.forEach(selector => {
    if (document.querySelector(selector)) {
      ScrollTrigger.batch(selector, {
        start: "top 85%",
        onEnter: batch => gsap.from(batch, { opacity: 0, y: 40, stagger: 0.15, duration: 1, ease: "power4.out" })
      });
    }
  });
  // --- PARALLAX IMAGES ---
  document.querySelectorAll('.process-image-wrapper img').forEach(img => {
    gsap.to(img, {
      scrollTrigger: { trigger: img, start: "top bottom", end: "bottom top", scrub: true },
      y: -40, ease: "none"
    });
  });
  // --- CLOCK ---
  if (document.querySelector('.clock-hours')) {
    const updateClock = () => {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", { timeZone: "Asia/Kolkata", hour: "numeric", minute: "2-digit", hour12: true }).formatToParts(now);
      document.querySelector(".clock-hours").textContent = parts.find(p => p.type === "hour").value;
      document.querySelector(".clock-minutes").textContent = parts.find(p => p.type === "minute").value;
      document.querySelector(".clock-meta").textContent = ` ${parts.find(p => p.type === "dayPeriod").value} (IST)`;
    };
    updateClock();
    setInterval(updateClock, 1000);
  }
  // Refresh ScrollTrigger to catch new page height
  ScrollTrigger.refresh();
}
// 4. BARBA TRANSITIONS
barba.init({
  sync: true,
  transitions: [{
    name: 'curtain-transition',
    async leave(data) {
      const done = this.async();
      gsap.to('.page-transition-layer', { 
        yPercent: 100, 
        duration: 0.8, 
        ease: "expo.inOut", 
        onComplete: done 
      });
    },
    async enter(data) {
      window.scrollTo(0, 0);
      lenis.scrollTo(0, { immediate: true });
      initPageScripts();
      gsap.to('.page-transition-layer', { 
        yPercent: 200, 
        duration: 0.8, 
        ease: "expo.inOut",
        onComplete: () => gsap.set('.page-transition-layer', { yPercent: -100 })
      });
    }
  }]
});
// Initial run
document.addEventListener("DOMContentLoaded", () => {
  initPageScripts();
});
</script>
